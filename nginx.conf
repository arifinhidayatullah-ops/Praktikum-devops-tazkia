events { worker_connections 1024; }

http {
    # 1. Redirect HTTP ke HTTPS (Semua Domain & Sub-domain)
    server {
        listen 80;
        server_name psbfajrussalam.my.id www.psbfajrussalam.my.id monitor.psbfajrussalam.my.id;

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # 2. Routing HTTPS: Aplikasi Web Utama
    server {
        listen 443 ssl;
        server_name psbfajrussalam.my.id www.psbfajrussalam.my.id;

        ssl_certificate /etc/letsencrypt/live/psbfajrussalam.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/psbfajrussalam.my.id/privkey.pem;

        location / {
            proxy_pass http://web-app:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # 3. Routing HTTPS: Dashboard Uptime Kuma
    server {
        listen 443 ssl;
        server_name monitor.psbfajrussalam.my.id;

        ssl_certificate /etc/letsencrypt/live/psbfajrussalam.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/psbfajrussalam.my.id/privkey.pem;

        location / {
            proxy_pass http://uptime-kuma:3001;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Dukungan WebSocket untuk interaksi real-time dashboard
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}