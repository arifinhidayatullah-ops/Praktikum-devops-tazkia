version: '3.8'

services:
  # 1. Aplikasi Web Static Pendaftaran Santri
  web-app:
    image: nginx:alpine
    container_name: uas-static-app
    restart: always
    volumes:
      - ./html:/usr/share/nginx/html

  # 2. Nginx Reverse Proxy (Gerbang Utama Port 80 & 443)
  reverse-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    depends_on:
      - web-app

  # 3. Certbot Let's Encrypt (Pengurus Sertifikat SSL HTTPS)
  certbot:
    image: certbot/certbot
    container_name: certbot-ssl
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  certbot-etc:
  certbot-var: