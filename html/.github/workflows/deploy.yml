name: Proyek Akhir DevOps CI/CD Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Menjalankan Perintah Deployment di VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: '202.10.36.46'
          username: 'root'
          # Kita pakai password SSH VPS lo agar ringkas dan langsung terhubung
          password: 'MASUKKAN_PASSWORD_VPS_LO_DI_SINI' 
          script: |
            cd ~/Praktikum-devops-tazkia
            git pull origin main
            docker compose up -d --build